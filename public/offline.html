<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>PipLinePro - Offline</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #f9f9fa;
        color: #1a1a1a;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100dvh;
        padding: 2rem;
        text-align: center;
      }
      .container { max-width: 360px; }
      .icon {
        width: 64px; height: 64px;
        margin: 0 auto 1.5rem;
        border-radius: 16px;
        background: #f0f0f1;
        display: flex; align-items: center; justify-content: center;
      }
      .icon svg { width: 32px; height: 32px; color: #888; }
      h1 { font-size: 1.25rem; font-weight: 600; margin-bottom: 0.5rem; }
      p { font-size: 0.875rem; color: #666; line-height: 1.5; margin-bottom: 1.5rem; }
      button {
        font-family: inherit;
        font-size: 0.875rem;
        font-weight: 500;
        padding: 0.625rem 1.5rem;
        border-radius: 8px;
        border: 1px solid #ddd;
        background: #fff;
        color: #1a1a1a;
        cursor: pointer;
        transition: background 0.15s;
      }
      button:hover { background: #f5f5f5; }
      @media (prefers-color-scheme: dark) {
        body { background: #0d1119; color: #e5e5e5; }
        .icon { background: #1a2233; }
        .icon svg { color: #8899aa; }
        p { color: #999; }
        button { background: #1a2233; border-color: #2a3344; color: #e5e5e5; }
        button:hover { background: #222d3e; }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="icon">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126ZM12 15.75h.007v.008H12v-.008Z" />
        </svg>
      </div>
      <h1>You're offline</h1>
      <p>Please check your internet connection and try again.</p>
      <button onclick="window.location.reload()">Retry</button>
    </div>
  </body>
</html>
