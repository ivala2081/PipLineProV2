<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/1.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <title>PipLinePro</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      window.__APP_ERROR__ = null;
      window.onerror = function(msg, url, line, col, err) {
        window.__APP_ERROR__ = { message: (err && err.message) || msg, stack: err && err.stack };
        var root = document.getElementById('root');
        if (root) root.innerHTML = '<div style="padding:24px;font-family:system-ui"><h1 style="color:#dc2626">Error</h1><pre style="background:#fef2f2;padding:16px;overflow:auto">' + (window.__APP_ERROR__.message || 'Unknown') + '</pre></div>';
        return true;
      };
      window.addEventListener('unhandledrejection', function(e) {
        var msg = (e.reason && e.reason.message) || String(e.reason) || 'Unhandled rejection';
        var root = document.getElementById('root');
        if (root) root.innerHTML = '<div style="padding:24px;font-family:system-ui"><h1 style="color:#dc2626">Error</h1><pre style="background:#fef2f2;padding:16px;overflow:auto">' + msg + '</pre></div>';
        e.preventDefault();
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
