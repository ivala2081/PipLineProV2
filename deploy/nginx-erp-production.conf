# Nginx config for erp.orderinvests.net (PRODUCTION - serves built static files)
# Use this after: npm run build
# Serves from dist/ folder - no Node process needed

server {
    listen 80;
    server_name erp.orderinvests.net erp.orderinvest.net;

    root /path/to/PipLineProV2/dist;
    index index.html;

    # SPA fallback - all routes go to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
}
