# Nginx config for erp.orderinvests.net
# Place in /etc/nginx/sites-available/ and symlink to sites-enabled
# Or include in your main nginx.conf

server {
    listen 80;
    server_name erp.orderinvests.net erp.orderinvest.net;

    # Proxy to Vite dev server (when using npm run dev)
    location / {
        proxy_pass http://127.0.0.1:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # WebSocket support (for Vite HMR in dev)
    location /@vite/ {
        proxy_pass http://127.0.0.1:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}
